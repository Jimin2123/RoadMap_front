<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이력서 등록</title>
    <style>
      /* 기본 설정 */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Noto Sans KR', sans-serif;
        background-color: #f9f9f9;
        padding: 40px 20px;
      }

      /* 메인 폼 컨테이너 */
      .resume-form {
        max-width: 960px;
        margin: auto;
      }

      /* 카드 스타일 섹션 */
      .card {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
      }

      /* 제목 */
      .card h2 {
        font-size: 18px;
        margin-bottom: 16px;
        color: #222;
      }

      /* 입력 필드 공통 */
      input[type='text'],
      input[type='email'],
      input[type='tel'] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        margin-top: 4px;
      }

      /* 라벨 */
      label {
        font-weight: 500;
        display: block;
        margin-bottom: 4px;
        color: #444;
      }

      /* 버튼 */
      button {
        margin-top: 16px;
        padding: 10px 20px;
        background-color: #f08c00;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background-color: #d97706;
      }

      /* 제출 버튼 영역 */
      .submit-area {
        text-align: center;
        margin-top: 40px;
      }

      /* 그리드 */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      /* 반응형 */
      @media (max-width: 768px) {
        .grid-3 {
          grid-template-columns: 1fr;
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="resume-form">
      <!-- 기본 정보 -->
      <section class="card">
        <div class="grid-3">
          <div><label>이름</label><input type="text" placeholder="홍길동" /></div>
          <div><label>이메일</label><input type="email" placeholder="email@example.com" /></div>
          <div><label>연락처</label><input type="tel" placeholder="010-1234-5678" /></div>
        </div>

        <div class="grid-2">
          <div><label>주소</label><input type="text" placeholder="거주지 주소 입력" /></div>
          <div><label>직업</label><input type="text" placeholder="예: 학생 / 개발자" /></div>
        </div>
      </section>

      <!-- 기술 역미 -->
      <section class="card">
        <h2>기술 역미</h2>
        <div class="grid-3">
          <div><label>작품</label><input type="text" placeholder="예: 제작한 앱명" /></div>
          <div><label>부서형</label><input type="text" placeholder="예: 프론트엔드" /></div>
          <div><label>투입 기간</label><input type="text" placeholder="예: 2023.01~06" /></div>
        </div>
        <div><label>담당 업무</label><input type="text" placeholder="주요 역할 입력" /></div>
        <button type="button">장폭 추가</button>
      </section>

      <!-- 정묵 -->
      <section class="card">
        <h2>정묵</h2>
        <div class="grid-3">
          <div><label>활동명</label><input type="text" placeholder="예: 앱 기획/개발" /></div>
          <div><label>소속 기관</label><input type="text" placeholder="소속 입력" /></div>
          <div><label>근무 기간</label><input type="text" placeholder="예: 2023.03~09" /></div>
        </div>
        <div><label>설명</label><input type="text" placeholder="활동에 대한 설명" /></div>
        <button type="button">코드제로 추가</button>
      </section>

      <!-- 교육 -->
      <section class="card">
        <h2>교육</h2>
        <div class="grid-2">
          <div><label>학교</label><input type="text" placeholder="학교명 입력" /></div>
          <div><label>전공</label><input type="text" placeholder="전공 입력" /></div>
        </div>
        <div class="grid-2">
          <div><label>재학 기간</label><input type="text" placeholder="2020.03 ~ 2024.02" /></div>
          <div><label>상태</label><input type="text" placeholder="재학 / 졸업" /></div>
        </div>
      </section>

      <!-- 대외활동 -->
      <section class="card">
        <h2>대외활동</h2>
        <div class="grid-3">
          <div><label>활동명</label><input type="text" placeholder="활동 이름" /></div>
          <div><label>소속 기관</label><input type="text" placeholder="소속" /></div>
          <div><label>기간</label><input type="text" placeholder="2023.01 ~ 06" /></div>
        </div>
        <div><label>설명</label><input type="text" placeholder="활동 내용 설명" /></div>
      </section>

      <div class="submit-area">
        <button type="submit">이력서 제출</button>
      </div>
    </div>
  </body>
</html>
