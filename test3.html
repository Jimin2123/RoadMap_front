<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이력서 등록</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 40px 20px;
        font-family: 'Helvetica', sans-serif;
        background-color: #f9f9f9;
        color: #333;
      }

      .resume-container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.04);
        flex: 1;
      }

      .card h2 {
        font-size: 18px;
        margin-bottom: 16px;
        border-bottom: 1px solid #eee;
        padding-bottom: 6px;
      }

      .card label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
      }

      .card input,
      .card textarea {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }

      .card-row {
        display: flex;
        gap: 20px;
        margin-bottom: 24px;
      }

      .full-width {
        width: 100%;
      }

      @media (max-width: 768px) {
        .card-row {
          flex-direction: column;
        }
      }

      .submit-area {
        text-align: center;
        margin-top: 30px;
      }

      .submit-area button {
        background-color: #f08c00;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
      }

      .submit-area button:hover {
        background-color: #d97706;
      }
    </style>
  </head>
  <body>
    <div class="resume-container">
      <section class="card full-width">
        <h2>기본 정보</h2>
        <label>이름</label>
        <input type="text" placeholder="홍길동" />
        <label>이메일</label>
        <input type="email" placeholder="email@example.com" />
        <label>연락처</label>
        <input type="tel" placeholder="010-1234-5678" />
        <label>주소</label>
        <input type="text" placeholder="거주지 주소 입력" />
        <label>직업</label>
        <input type="text" placeholder="예: 학생 / 개발자" />
      </section>

      <section class="card full-width">
        <h2>자기소개</h2>
        <textarea rows="6" placeholder="자기소개를 입력하세요."></textarea>
      </section>

      <div class="card-row">
        <section class="card">
          <h2>자격증</h2>
          <label>자격증명</label>
          <input type="text" placeholder="정보처리기사" />
          <label>발급 기관</label>
          <input type="text" placeholder="한국산업인력공단" />
          <label>취득 연도</label>
          <input type="text" placeholder="2023" />
        </section>

        <section class="card">
          <h2>기술 스택</h2>
          <label>보유 기술</label>
          <input type="text" placeholder="HTML, CSS, JavaScript, React 등" />
        </section>
      </div>

      <div class="card-row">
        <section class="card">
          <h2>교육</h2>
          <label>학교</label>
          <input type="text" placeholder="서울대학교" />
          <label>전공</label>
          <input type="text" placeholder="컴퓨터공학과" />
          <label>재학 기간</label>
          <input type="text" placeholder="2020.03 ~ 2024.02" />
          <label>상태</label>
          <input type="text" placeholder="재학 / 졸업" />
        </section>

        <section class="card">
          <h2>대외활동</h2>
          <label>활동명</label>
          <input type="text" placeholder="봉사단, 해커톤 등" />
          <label>기관명</label>
          <input type="text" placeholder="기관명 입력" />
          <label>활동 기간</label>
          <input type="text" placeholder="2022.01 ~ 2022.06" />
        </section>
      </div>

      <div class="card-row">
        <section class="card">
          <h2>프로젝트</h2>
          <label>프로젝트명</label>
          <input type="text" placeholder="포트폴리오 웹사이트 제작" />
          <label>참여 기간</label>
          <input type="text" placeholder="2023.03 ~ 2023.05" />
          <label>기술 스택</label>
          <input type="text" placeholder="React, Node.js" />
          <label>설명</label>
          <textarea rows="3" placeholder="기능 및 역할 등 간단히 작성"></textarea>
        </section>

        <section class="card">
          <h2>포트폴리오</h2>
          <label>포트폴리오 제목</label>
          <input placeholder="청년취업역량증진 길라잡이" />
          <label>포트폴리오 URL</label>
          <input type="url" placeholder="https://yourportfolio.com" />
        </section>
      </div>

      <section class="card full-width">
        <h2>추가 프로젝트</h2>
        <label>추가 프로젝트명</label>
        <input type="text" placeholder="기타 프로젝트명" />
        <label>설명</label>
        <textarea rows="3" placeholder="간단한 설명 작성"></textarea>
      </section>

      <div class="submit-area">
        <button type="submit">이력서 제출</button>
      </div>
    </div>
  </body>
</html>
